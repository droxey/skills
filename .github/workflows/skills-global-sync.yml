name: skills-global-sync

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - 'skills-manifest.json'
      - '**/SKILL.md'
      # Keep this list aligned with top-level skill folders so non-SKILL file changes
      # inside existing skills still trigger sync without broadening to docs/automation paths.
      - 'chrome-mcp-web-fallback/**'
      - 'code/**'
      - 'codespace-operator/**'
      - 'codespace-operator-v2/**'
      - 'dani-roxberrys-teaching-voice/**'
      - 'markdown-mode-router/**'
      - 'model-cost-estimator/**'
      - 'musexmachine-mcp-codex-env/**'
      - 'product-clone-research/**'
      - 'prompt-technique-router/**'
      - 'repo-settings-bootstrap/**'
      - 'resume-ats-pdf-optimizer/**'
  workflow_dispatch:

jobs:
  sync-smoke:
    name: sync-smoke-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
      - name: Validate scripts and manifest
        shell: bash
        run: |
          bash -n scripts/sync-skills.sh
          python3 -m json.tool skills-manifest.json >/dev/null
      - name: Dry-run sync
        shell: bash
        run: |
          bash scripts/sync-skills.sh --manifest skills-manifest.json --dest "$RUNNER_TEMP/codex-skills"

  sync-apply-opt-in:
    name: sync-apply-opt-in-${{ matrix.os }}
    if: vars.GLOBAL_SYNC_APPLY == 'true'
    runs-on: ${{ matrix.os }}
    needs: [sync-smoke]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
      - name: Apply sync
        shell: bash
        run: |
          bash scripts/sync-skills.sh --manifest skills-manifest.json --dest "$RUNNER_TEMP/codex-skills" --apply
